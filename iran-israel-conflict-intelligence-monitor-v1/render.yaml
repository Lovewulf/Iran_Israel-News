services:
  - type: web
    name: iran-israel-news
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # NEW: RSS‑Bridge service for X/Twitter feeds
  - type: web
    name: rss-bridge
    runtime: image
    image:
      url: rssbridge/rss-bridge:latest
    plan: free
    envVars:
      - key: PORT
        value: 80
